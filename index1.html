<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gveret+Levin&family=Matemasie&family=Oi&display=swap"
        rel="stylesheet">
    <title>Welcome Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .oi-regular {
            font-family: "Oi", serif;
            font-weight: 50;
            font-style: normal;
        }
        .matemasie-regular {
  font-family: "Matemasie", sans-serif;
  font-weight: 400;
  font-style: normal;
}


        .gveret-levin-regular {
            font-family: "Gveret Levin", cursive;
            font-weight: 400;
            font-style: normal;
        }


        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('pictures/underwater.jpg');
            background-position: center;
            background-size: cover;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 2rem;
        }

        h1 {
            font-size: 20rem;
            text-align: center;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: fadeInDown 1s ease-out;
        }

        p {
            font-size: 5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .heroImage {}

        .play-btn {
            position: relative;
            z-index: 3;
            top: -500px;
            background-color: #3867df;
            color: #ffffff;
            border: none;
            width: 800px;
            padding: 3rem 6rem;
            font-size: 10rem;
            font-weight: bold;
            border-radius: 200px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            background-color: #f0f0f0;
        }

        .play-btn:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1rem;
            }

            .play-btn {
                padding: 0.8rem 2rem;
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="gveret-levin-regular">Welcome</h1>
        <p class="gveret-levin-regular">Let's save our sea</p>
        <img class="heroImage" src="pictures/sealion_smile.png" alt="">
        <button class="play-btn matemasie-regular" id="playButton">Play</button>
    </div>

    <script>
        // Get button element
        const playButton = document.getElementById('playButton');

        // Add event listener for click
        playButton.addEventListener('click', function () {
            // Example action: show message and redirect to game page (replace with target URL)
            alert('Starting game...');
            // window.location.href = 'game.html'; // uncomment to navigate to another page
        });
    </script>
</body>

</html>
